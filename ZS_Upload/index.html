<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Automatischer Download</title>
</head>
<body>
<script>
  // URL der ZIP-Datei
  const zipUrl = 'Zombie Survivor.zip';

  // Funktion zum Starten des Downloads
  function downloadAndClose() {
    const a = document.createElement('a');
    a.href = zipUrl;
    a.download = ''; // Leer lassen = Originalname beibehalten
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    // Fenster nach kurzer Verzögerung schließen
    setTimeout(() => {
      window.close();
    }, 1000); // 1 Sekunde warten, um Download zu starten
  }

  // Direkt beim Laden ausführen
  window.onload = downloadAndClose;
</script>
</body>
</html>
